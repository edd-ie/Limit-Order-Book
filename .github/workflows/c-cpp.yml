name: C++ CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang cmake

      - name: Configure
        run: |
          cmake -B build --preset default

      - name: Build
        run: cmake --build --preset default

      - name: Run executable
        run: ./build/default/limit_order_book
